<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>寿了个司</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <section id="loadingScreen" class="intro-screen loading-screen" aria-label="加载页">
      <div class="intro-glow" aria-hidden="true"></div>
      <div class="brand-logo" aria-label="寿了个司">
        <span>寿</span><span>了</span><span>个</span><span>司</span>
      </div>
      <p class="loading-text">备餐中...</p>
      <div class="loading-track" aria-hidden="true">
        <span id="loadingBar"></span>
      </div>
    </section>

    <section id="homeScreen" class="intro-screen home-screen" aria-label="首页" hidden>
      <div class="home-top">
        <div class="brand-logo home-logo" aria-label="寿了个司">
          <span>寿</span><span>了</span><span>个</span><span>司</span>
        </div>
        <div class="home-toggles" aria-label="音效震动">
          <button id="homeSoundBtn" class="toggle-btn" type="button" aria-pressed="true" aria-label="音效">
            <span aria-hidden="true"></span>
          </button>
          <button id="homeVibrateBtn" class="toggle-btn" type="button" aria-pressed="true" aria-label="震动">
            <span aria-hidden="true"></span>
          </button>
        </div>
      </div>

      <div class="home-card">
        <p id="homeProgress" class="home-progress">已解锁第 1 关</p>
        <button id="continueBtn" class="menu-btn primary-menu" type="button">
          <span>继续挑战</span>
          <b>从最高关卡开始</b>
        </button>
        <button id="startOverBtn" class="menu-btn" type="button">
          <span>从头开始</span>
          <b>清空最高关卡进度</b>
        </button>
        <button id="helpBtn" class="menu-btn" type="button">
          <span>玩法说明</span>
          <b>快速看一眼规则</b>
        </button>
      </div>
    </section>

    <main id="game" class="game-shell" aria-label="寿了个司 H5 游戏" hidden>
      <section class="top-bar" aria-label="游戏状态">
        <div class="status-row">
          <div class="stat stat-level">
            <span>关卡</span>
            <strong id="levelLabel">1</strong>
          </div>
          <div class="stat score-stat">
            <span>分数</span>
            <strong id="scoreLabel">0</strong>
          </div>
          <div class="stat stat-best">
            <span>榜单</span>
            <strong id="bestLabel">0</strong>
          </div>
          <div class="quick-toggles" aria-label="音效震动">
            <button id="soundBtn" class="toggle-btn" type="button" aria-pressed="true" aria-label="音效">
              <span aria-hidden="true"></span>
            </button>
            <button id="vibrateBtn" class="toggle-btn" type="button" aria-pressed="true" aria-label="震动">
              <span aria-hidden="true"></span>
            </button>
            <button id="exitBtn" class="toggle-btn exit-btn" type="button" aria-label="退出并保存">退出</button>
          </div>
        </div>
        <span id="levelName" class="level-name" hidden></span>
      </section>

      <section class="tool-row" aria-label="道具">
        <button id="undoBtn" class="tool-btn" type="button"></button>
        <button id="rotateBtn" class="tool-btn" type="button"></button>
        <button id="restartBtn" class="tool-btn" type="button"></button>
      </section>

      <section class="plate-panel" aria-label="寿司已出餐">
        <div class="panel-heading">
          <h1>寿司已出餐</h1>
        </div>
        <div id="board" class="plate-grid" aria-label="6 乘 6 寿司盘"></div>
      </section>

      <section class="tray-panel" aria-label="摆盘">
        <div class="panel-heading compact">
          <h2>摆盘：</h2>
          <span id="remainingLabel">0</span>
        </div>
        <button id="tray" class="tray" type="button" aria-label="当前寿司组合"></button>
        <p id="message" class="message" aria-live="polite"></p>
      </section>

      <section class="orders-panel" aria-label="今日待出餐">
        <div class="panel-heading compact">
          <h2>今日待出餐：</h2>
        </div>
        <div id="orders" class="orders-grid" aria-label="今日待出餐列表"></div>
      </section>
    </main>

    <div id="helpModal" class="modal" hidden>
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="helpTitle">
        <h2 id="helpTitle">玩法说明</h2>
        <p>把“今日待出餐”的寿司组合拖到“寿司已出餐”的盘面里。三个相同寿司横向或竖向连在一起就会抵消。</p>
        <p>每关都需要把全部寿司抵消干净。撤回和旋转次数有限，要先想好摆放顺序。</p>
        <div class="modal-actions">
          <button id="helpCloseBtn" class="primary-action" type="button">知道了</button>
        </div>
      </section>
    </div>

    <div id="resetModal" class="modal" hidden>
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="resetTitle">
        <h2 id="resetTitle">从头开始？</h2>
        <p>这会把最高关卡进度重置到第 1 关，榜单分数会保留。</p>
        <div class="modal-actions">
          <button id="cancelResetBtn" class="secondary-action" type="button">取消</button>
          <button id="confirmResetBtn" class="primary-action" type="button">确认重置</button>
        </div>
      </section>
    </div>

    <div id="resultModal" class="modal" hidden>
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
        <h2 id="resultTitle">完成</h2>
        <p id="resultText"></p>
        <div class="modal-actions">
          <button id="retryBtn" class="secondary-action" type="button">重来</button>
          <button id="nextBtn" class="primary-action" type="button">下一关</button>
        </div>
      </section>
    </div>

    <script src="./game.js"></script>
  </body>
</html>
